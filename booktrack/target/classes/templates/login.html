<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BookTrack - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); width: 340px; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        h2 { color: #555; font-size: 1.1rem; margin-bottom: 24px; font-weight: normal; }
        input { width: 100%; padding: 10px 14px; margin-bottom: 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        button { width: 100%; padding: 11px; background: #4a90e2; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #357abd; }
        .error { color: red; margin-top: 14px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📚 BookTrack</h1>
        <h2>Iniciar sesión</h2>
        <form th:action="@{/login}" method="post">
            <input type="text" name="username" placeholder="Usuario" required/>
            <input type="password" name="password" placeholder="Contraseña" required/>
            <button type="submit">Entrar</button>
        </form>
        <p class="error" th:if="${param.error}">Usuario o contraseña incorrectos</p>
    </div>
</body>
</html>
